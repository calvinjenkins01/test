name: Daily content SMS

on:
  schedule:
    # 13:45 UTC = 6:45 AM Phoenix — today.txt is ready before the 7am phone automation
    - cron: "45 13 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "What to send"
        type: choice
        options:
          - today
          - week
          - dry_run
        default: today

permissions:
  contents: write

jobs:
  sms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Write today's checklist file (for iPhone automation)
        run: python daily-sms/send_sms.py --today-file

      - name: Commit today's checklist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-sms/today.txt
          git diff --cached --quiet || git commit -m "Daily checklist $(date -u +%F)"
          git push

      - name: Send via Twilio (works after account upgrade; trial accounts skip)
        continue-on-error: true
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          MY_PHONE_NUMBER: ${{ secrets.MY_PHONE_NUMBER }}
        run: |
          case "${{ inputs.mode }}" in
            week) python daily-sms/send_sms.py --week ;;
            dry_run) python daily-sms/send_sms.py --dry-run ;;
            *) python daily-sms/send_sms.py ;;
          esac
